name: 跨平台构建

on:
  push:
    branches: [main]
    tags: ['*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.name }} · Python ${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: Windows
            python: '3.11'
          - os: ubuntu-latest
            name: Linux
            python: '3.11'
          - os: macos-latest
            name: macOS
            python: '3.11'

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Linux 安装 Qt 依赖
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-sync1 \
            libxcb-util1 \
            libxcb-xfixes0 \
            libxcb-xinerama0 \
            libxcb-xkb1 \
            libxkbcommon-x11-0 \
            libgl1 \
            libegl1 \
            libdbus-1-3

      - name: 构建
        run: python build.py

      - name: 打包产物 (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ClassBoard-Windows
          path: dist/ClassBoard.exe

      - name: 打包产物 (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: ClassBoard-Linux
          path: dist/ClassBoard

      - name: 打包产物 (macOS)
        if: runner.os == 'macOS'
        run: |
          cd dist
          zip -r ClassBoard-macOS.zip ClassBoard.app

      - name: 上传产物 (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ClassBoard-macOS
          path: dist/ClassBoard-macOS.zip

  release:
    name: 发布 Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 下载所有产物
        uses: actions/download-artifact@v4

      - name: 创建 Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ClassBoard-Windows/ClassBoard.exe
            ClassBoard-Linux/ClassBoard
            ClassBoard-macOS/ClassBoard-macOS.zip
          draft: false
          prerelease: false